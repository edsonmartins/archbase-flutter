# Configuração compartilhada pelos flows Maestro do demo.
#
# `appId` é parametrizado por env var porque o bundle id difere entre
# Android (com.archbase.archbase_demo, com underscore) e iOS
# (com.archbase.archbaseDemo, sem underscore — iOS não permite `_`).
#
# Definir antes de rodar localmente:
#   export APP_ID=com.archbase.archbase_demo  # Android
#   export APP_ID=com.archbase.archbaseDemo   # iOS
#
# Em CI, o workflow .github/workflows/maestro-cloud.yml passa o valor
# certo por plataforma via `env: APP_ID=...` no action-maestro-cloud.
appId: ${APP_ID}

# Flutter envolve toda a árvore num FlutterView. O Maestro usa engine de
# acessibilidade nativa, então identificadores baseados em ValueKey
# (em widgets Flutter) aparecem como `accessibilityIdentifier` no iOS e
# como `tag` na semantics tree do Android.
executionOrder:
  flowsOrder:
    - 01_login
    - 02_crud
    - 03_offline
    - 04_settings
