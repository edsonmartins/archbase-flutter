name: archbase_flutter_riverpod
description: Adapter Riverpod para archbase_flutter — providers para os singletons do bootstrap, StreamProviders reativos e ArchbaseRiverpodNotifier base com guard().
version: 0.2.0
homepage: https://github.com/edsonmartins/archbase-flutter
repository: https://github.com/edsonmartins/archbase-flutter/tree/main/packages/archbase_flutter_riverpod
issue_tracker: https://github.com/edsonmartins/archbase-flutter/issues
documentation: https://edsonmartins.github.io/archbase-flutter/docs/adapters/riverpod

topics:
  - riverpod
  - state-management
  - framework
  - providers

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  archbase_flutter: ^0.5.2
  flutter_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Override só para desenvolvimento local — ignorado pelo pub.dev publish.
# Permite rodar testes do adapter contra a versão local da archbase_flutter.
dependency_overrides:
  archbase_flutter:
    path: ../..

flutter:
  uses-material-design: true
