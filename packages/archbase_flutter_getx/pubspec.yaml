name: archbase_flutter_getx
description: Adapter GetX para a archbase_flutter. Bindings para registrar os singletons do bootstrap no Get e um GetxController base com guard() de loading/erro.
version: 0.1.0
publish_to: none
homepage: https://github.com/edsonmartins/archbase-flutter
repository: https://github.com/edsonmartins/archbase-flutter

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  archbase_flutter:
    path: ../..
  get: ^4.6.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
