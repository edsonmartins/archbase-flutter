name: archbase_flutter
description: Framework Flutter da família Archbase. Provê services, widgets, templates de tela, theme system, validadores e utils para acelerar o desenvolvimento de apps Flutter empresariais com suporte offline-first.
version: 0.1.0
homepage: https://github.com/edsonmartins/archbase-flutter
repository: https://github.com/edsonmartins/archbase-flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4

  # Geolocation
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # Push & Local notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  record: ^6.1.2
  audioplayers: ^6.1.0
  signature: ^5.5.0
  cached_network_image: ^3.4.1
  mobile_scanner: ^5.2.3
  photo_view: ^0.15.0

  # UI / Design
  flutter_screenutil: ^5.9.3
  lucide_icons_flutter: ^1.2.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.2
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  brasil_fields: ^1.14.0
  cpf_cnpj_validator: ^2.0.0
  flutter_masked_text2: ^0.9.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.0
  device_info_plus: ^11.1.0
  local_auth: ^2.3.0
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
